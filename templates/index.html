<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>start</title>
</head>
<body>
    <form action="/" method="post">
        <div class="form-group">
            <div id="form_zag">Регистрация пациента</div>
        </div>
        <div class="form-group">
            <input name="fio" type="text" class="form-control" placeholder="Введите ФИО пациента"/>
        </div>
        <div class="form-group">
            <input name="date_birth" type="date" class="form-control" placeholder="Введите дату рождения пациента"/>
        </div>
        <div class="form-group">
            <input name="password" type="password" class="form-control" placeholder="Введите пароль"/>
        </div>
        <div class="form-group">
            <button type="submit" id="form_btn">Отправить</button>
        </div>
    </form>
</body>
</html>
